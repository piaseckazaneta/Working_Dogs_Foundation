
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Dogs Foundation – Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f7; color: #333; }
        
        .header {
            background: #092e5a;
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header h1 { font-size: 40px; font-weight: 500; }
        .header p { font-size: 20px; opacity: 0.85; margin-top: 4px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-img {
            height: 90px;
            width: 160px;
            object-fit: cover;
            object-position: center top;
            border-radius: 8px;
            opacity: 0.9;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 30px 20px; }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            color: #092e5a;
            margin: 30px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #092e5a;
        }

        .map-wrapper {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 520px;
        }
        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 8px 18px;
            border: 2px solid #092e5a;
            border-radius: 20px;
            background: white;
            color: #092e5a;
            cursor: pointer;
            font-size: 13px;
            font-family: Arial, sans-serif;
            transition: all 0.2s;
        }
        .tab-btn:hover { background: #92dff9; }
        .tab-btn.active { background: #092e5a; color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .chart-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .footer {
            background: #092e5a;
            text-align: center;
            padding: 30px;
            color: #cddbe5;
            font-size: 12px;
            margin-top: 40px;
        }
        .footer a { color: #92dff9; text-decoration: none; }
    </style>
</head>
